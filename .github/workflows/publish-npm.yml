name: Publish npm Package

on:
  push:
    tags:
      - "figma-design-pipeline-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run build:desktop
      - run: npm run build:figma-community
      - uses: actions/upload-artifact@v6
        with:
          name: spicefactory-figma-design-pipeline-release-assets
          path: |
            dist/figma-design-pipeline.mcpb
            dist/spfr-figma-plugin-community.zip
            dist/figma-community-submission/
      - run: npm publish --provenance --access public
